<svg viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="PermitJockey">
  <!--
    Horizontal wordmark — dark on transparent (for light backgrounds)

    Mark is the P/helmet scaled to 64px tall, centred in 80px height (8px top/bottom margin).
    Scale from icon: 64/205 ≈ 0.312

    Stem:  x=0–14, y=8–72 (14×64px)
    Bowl:  half-ellipse M 14 8 A 25 18 0 0 1 14 44
           (rx=25, ry=18; end y = 8+36 = 44; max x = 39)
    Peak:  (38,20)→(57,26)→(38,32)
    Strap: M 14 44 Q 26 60 40 63
  -->

  <!-- Stem -->
  <rect x="0" y="8" width="14" height="64" rx="3" fill="#1c1917"/>

  <!-- Helmet dome -->
  <path d="M 14 8 A 25 18 0 0 1 14 44 L 14 8 Z" fill="#1c1917"/>

  <!-- Visor -->
  <path d="M 38 20 L 57 26 L 38 32 Z" fill="#f59e0b"/>

  <!-- Chin strap -->
  <path d="M 14 44 Q 26 60 40 63"
        stroke="#f59e0b" stroke-width="5"
        fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="68" y="54"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        fill="#1c1917"
        letter-spacing="-0.5">
    <tspan font-weight="400">Permit</tspan><tspan font-weight="800">Jockey</tspan>
  </text>
</svg>
