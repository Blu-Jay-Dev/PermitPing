<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark circle background -->
  <circle cx="256" cy="256" r="256" fill="#1c1917"/>

  <!--
    Jockey helmet — front view.
    Dome: cubic bezier arc from (97,308) to (415,308), peaking at ~y=152.
    Stripe: amber band clipped to dome.
    Brim: wide rounded rect beneath dome.
  -->

  <defs>
    <clipPath id="dome-clip">
      <path d="M 97 308 C 97 108 415 108 415 308 Z"/>
    </clipPath>
  </defs>

  <!-- Dome (white) -->
  <path d="M 97 308 C 97 108 415 108 415 308 Z" fill="white"/>

  <!-- Amber goggle stripe — clipped to dome -->
  <rect x="80" y="210" width="352" height="60" fill="#f59e0b" clip-path="url(#dome-clip)"/>

  <!-- Brim (wider than dome, flush with dome base) -->
  <rect x="52" y="295" width="408" height="58" rx="14" fill="white"/>
</svg>
