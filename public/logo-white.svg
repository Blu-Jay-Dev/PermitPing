<svg viewBox="0 0 300 68" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="PermitJockey">
  <!-- Jockey helmet mark — white on transparent (dark backgrounds) -->
  <defs>
    <clipPath id="wm-dome-w">
      <path d="M 7 47 C 7 9 43 9 43 47 Z"/>
    </clipPath>
  </defs>

  <!-- Dome -->
  <path d="M 7 47 C 7 9 43 9 43 47 Z" fill="white"/>

  <!-- Amber goggle stripe (amber pops on dark too) -->
  <rect x="5" y="31" width="40" height="10" fill="#f59e0b" clip-path="url(#wm-dome-w)"/>

  <!-- Brim -->
  <rect x="2" y="44" width="46" height="13" rx="2.5" fill="white"/>

  <!-- PermitJockey wordmark -->
  <text x="58" y="49"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="36"
        fill="white"
        letter-spacing="-0.5">
    <tspan font-weight="400">Permit</tspan><tspan font-weight="800">Jockey</tspan>
  </text>
</svg>
